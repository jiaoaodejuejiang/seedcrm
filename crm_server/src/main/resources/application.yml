spring:
  datasource:
    url: ${SEEDCRM_DATASOURCE_URL:jdbc:mysql://localhost:3306/crm?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai}
    username: ${SEEDCRM_DATASOURCE_USERNAME:root}
    password: ${SEEDCRM_DATASOURCE_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

seedcrm:
  openapi:
    enabled: ${SEEDCRM_OPENAPI_ENABLED:true}
    allow-local-without-token: ${SEEDCRM_OPENAPI_ALLOW_LOCAL_WITHOUT_TOKEN:true}
  domain:
    system-base-url: ${SEEDCRM_SYSTEM_BASE_URL:http://127.0.0.1:4173}
    api-base-url: ${SEEDCRM_API_BASE_URL:http://127.0.0.1:8080}
